<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
overflow-x:hidden;
}

/* FLOATING BG */
body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.3);
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(80px);
animation:float 6s infinite alternate;
}
@keyframes float{
to{transform:translateY(50px);}
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
color:white;
font-size:22px;
font-weight:bold;
}

.logout{
background:#ff4d4d;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* CONTAINER */
.container{
padding:20px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.box{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.box h2{
color:#fff;
}

/* CHART SECTION */
.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.chartBox{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
text-align:center;
}

/* TABLE */
.tableBox{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

tr:nth-child(even){
background:rgba(255,255,255,0.2);
}

/* SEARCH */
.search{
margin-bottom:10px;
padding:8px;
width:100%;
border-radius:6px;
border:none;
}

/* TOPPER */
.topper{
margin-top:15px;
padding:15px;
background:rgba(255,255,255,0.3);
border-radius:10px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<div>🚀 Admin Dashboard</div>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="box">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="box">
<h2 id="students">0</h2>
<p>Students</p>
</div>

<div class="box">
<h2 id="admins">0</h2>
<p>Admins</p>
</div>

<div class="box">
<h2 id="exams">0</h2>
<p>Total Exams</p>
</div>
</div>

<!-- CHARTS -->
<div class="charts">

<div class="chartBox">
<h3>Users Distribution</h3>
<canvas id="pieChart" height="200"></canvas>
</div>

<div class="chartBox">
<h3>Subject Performance</h3>
<canvas id="barChart" height="200"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="tableBox">

<input class="search" placeholder="Search student..." onkeyup="searchTable(this.value)">

<table>
<thead>
<tr>
<th>Name</th>
<th>Subject</th>
<th>Score</th>
<th>%</th>
<th>Grade</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<div class="topper" id="topper"></div>

</div>

</div>

<script>

/* SECURITY */
if(localStorage.getItem("role")!=="admin"){
alert("Access Denied");
window.location.href="student_dashboard.html";
}

/* DATA */
let users = JSON.parse(localStorage.getItem("users")) || [];
let history = JSON.parse(localStorage.getItem("examHistory")) || [];

/* COUNTS */
let students = users.filter(u=>u.role==="student").length;
let admins = users.filter(u=>u.role==="admin").length;

totalUsers.innerText = users.length;
document.getElementById("students").innerText = students;
document.getElementById("admins").innerText = admins;
document.getElementById("exams").innerText = history.length;

/* GRADE FUNCTION */
function grade(p){
if(p>=85) return "A";
if(p>=70) return "B";
if(p>=50) return "C";
return "Fail";
}

/* TABLE */
let bestScore = 0;
let topperName = "No Data";

history.forEach(h=>{
let percent = Math.round((h.score/20)*100);

if(percent > bestScore){
bestScore = percent;
topperName = h.name;
}

table.innerHTML += `
<tr>
<td>${h.name}</td>
<td>${h.subject}</td>
<td>${h.score}/20</td>
<td>${percent}%</td>
<td>${grade(percent)}</td>
<td>${h.date}</td>
</tr>
`;
});

/* TOPPER */
document.getElementById("topper").innerText =
"🏆 Top Performer: " + topperName + " ("+bestScore+"%)";

/* SEARCH */
function searchTable(val){
val = val.toLowerCase();
let rows = document.querySelectorAll("#table tr");

rows.forEach(r=>{
r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
});
}

/* PIE CHART */
let pie = document.getElementById("pieChart").getContext("2d");

let total = students + admins;
let studentAngle = (students/total)*Math.PI*2;

pie.fillStyle = "#007bff";
pie.beginPath();
pie.moveTo(100,100);
pie.arc(100,100,80,0,studentAngle);
pie.fill();

pie.fillStyle = "#ff4d4d";
pie.beginPath();
pie.moveTo(100,100);
pie.arc(100,100,80,studentAngle,Math.PI*2);
pie.fill();

/* BAR CHART */
let subjects = {};
history.forEach(h=>{
if(!subjects[h.subject]) subjects[h.subject]=0;
subjects[h.subject]+=h.score;
});

let bar = document.getElementById("barChart").getContext("2d");

let x=20;
for(let s in subjects){
let h = subjects[s]*5;

bar.fillStyle="#28a745";
bar.fillRect(x,200-h,40,h);

bar.fillStyle="#000";
bar.fillText(s,x,190);

x+=60;
}

/* LOGOUT */
function logout(){
localStorage.clear();
window.location.href="../index.html";
}

</script>

</body>
</html>
