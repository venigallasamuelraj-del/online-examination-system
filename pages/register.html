<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#4ffe98,#00fafe);
overflow:hidden;
}

/* FLOATING EFFECT */
body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.3);
border-radius:50%;
top:-100px;
left:-100px;
filter:blur(80px);
animation:float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

/* CARD */
.container{
background:rgb(72, 228, 243);
width:380px;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
z-index:1;
}

h2{
margin-bottom:15px;
color:#222;
}

/* ROLE TOGGLE */
.role-toggle{
display:flex;
background:#e0e0e0;
border-radius:8px;
margin-bottom:15px;
overflow:hidden;
}

.role-toggle button{
flex:1;
padding:8px;
border:none;
cursor:pointer;
background:transparent;
font-weight:bold;
}

.role-toggle .active{
background:#007bff;
color:white;
}

/* INPUT */
.input-box{
position:relative;
margin:15px 0;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
background:transparent;
}

.input-box label{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
font-size:14px;
color:#555;
transition:.3s;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
top:-8px;
font-size:12px;
background:white;
padding:0 5px;
color:#007bff;
}

.toggle-pass{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* BUTTON */
button.submit{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

/* MSG */
.error{color:red;font-size:13px;display:none;}
.success{color:green;font-size:13px;display:none;}

.login-link{
margin-top:10px;
display:block;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account ✨</h2>

<!-- ROLE -->
<div class="role-toggle">
<button id="studentBtn" class="active" onclick="setRole('student')">Student</button>
<button id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

<!-- NAME -->
<div class="input-box">
<input type="text" id="name" placeholder=" ">
<label>Full Name</label>
</div>

<!-- ROLL -->
<div class="input-box">
<input type="text" id="roll" placeholder=" ">
<label>Roll Number</label>
</div>

<!-- EMAIL -->
<div class="input-box">
<input type="email" id="email" placeholder=" ">
<label>Email</label>
</div>

<!-- PASSWORD -->
<div class="input-box">
<input type="password" id="password" placeholder=" ">
<label>Password</label>
<span class="toggle-pass" onclick="togglePass('password')">👁️</span>
</div>

<!-- CONFIRM -->
<div class="input-box">
<input type="password" id="confirm" placeholder=" ">
<label>Confirm Password</label>
<span class="toggle-pass" onclick="togglePass('confirm')">👁️</span>
</div>

<div class="error" id="errorMsg"></div>
<div class="success" id="successMsg"></div>

<button class="submit" onclick="register()">Register</button>

<span class="login-link" onclick="goLogin()">
Already have account? Login
</span>

</div>

<script>

let role = "student";

/* ROLE SWITCH */
function setRole(r){
role = r;

studentBtn.classList.remove("active");
adminBtn.classList.remove("active");

if(r==="student") studentBtn.classList.add("active");
else adminBtn.classList.add("active");
}

/* PASSWORD TOGGLE */
function togglePass(id){
let f=document.getElementById(id);
f.type = f.type==="password" ? "text":"password";
}

/* REGISTER FUNCTION (FIXED) */
function register(){

let name = val("name");
let roll = val("roll");
let email = val("email");
let pass = val("password");
let conf = val("confirm");

let error = document.getElementById("errorMsg");
let success = document.getElementById("successMsg");

error.style.display="none";
success.style.display="none";

/* VALIDATION */
if(!name||!roll||!email||!pass||!conf){
return showError("Fill all fields");
}

/* EMAIL CHECK */
let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if(!emailRegex.test(email)){
return showError("Invalid email format");
}

/* PASSWORD */
if(pass.length < 4){
return showError("Password min 4 characters");
}

if(pass !== conf){
return showError("Passwords do not match");
}

/* GET USERS */
let users = JSON.parse(localStorage.getItem("users")) || [];

/* DUPLICATE CHECK */
if(users.some(u=>u.email===email)){
return showError("Email already exists");
}

if(users.some(u=>u.roll===roll)){
return showError("Roll already exists");
}

/* SAVE USER */
let newUser = {
name,
roll,
email,
password:pass,
role
};

users.push(newUser);
localStorage.setItem("users", JSON.stringify(users));

/* SUCCESS */
success.innerText="✅ Registered Successfully!";
success.style.display="block";

/* 🚨 FIX: GO TO LOGIN PAGE */
setTimeout(()=>{
window.location.href="../index.html";
},1200);

}

/* HELPERS */
function val(id){
return document.getElementById(id).value.trim();
}

function showError(msg){
let error = document.getElementById("errorMsg");
error.innerText=msg;
error.style.display="block";
}

/* LOGIN NAVIGATION */
function goLogin(){
window.location.href="../index.html";
}

</script>

</body>
</html>
